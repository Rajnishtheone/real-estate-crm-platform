version: "3.9"
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: realestate
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: ./server
    env_file: ./server/.env.example
    environment:
      DATABASE_URL: postgresql://app:secret@db:5432/realestate
      FRONTEND_URL: http://localhost:3000
      REDIS_HOST: redis
    ports:
      - "4000:4000"
    depends_on:
      - db
      - redis

  web:
    build: ./frontend
    env_file: ./frontend/.env.example
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  db_data:
